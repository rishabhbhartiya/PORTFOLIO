<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Part Page</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
    }

    .container {
        display: flex;
        height: 100%;
    }

    .left-side {
        width: 50%;
        height: 100%;
        background-color:green;
        overflow: hidden;
    }

    .left-content {
        width: 100%;
        height: 100%;
        overflow: auto;
        padding: 20px;
    }

    .right-side {
        width: 50%;
        height: 100%;
        background-color: #ccc;
        overflow-y: auto;
    }

    .box {
        width: 100%;
        height: 600px; /* Example height, adjust as needed */
        background-color:red;
        margin-bottom: 20px;
    }
</style>
</head>
<body>

<div class="container">
    <div class="left-side">
        <div class="left-content">
            <!-- Content for the left side -->
            <p>This is the left side with fixed width and height.</p> 
            <p>This content will not scroll.</p>
        </div>
    </div>
    <div class="right-side">
        <!-- Content for the right side -->
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
        <div class="box">Box 5</div>
        <!-- Add more boxes as needed -->
    </div>
</div>

</body>
</html>
