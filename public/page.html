    <style>
        .page {
            border: 2px solid red;
            width: 400px;
            height: 500px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            /* overflow-y: auto; */
            /* overflow: hidden; */
            overflow-y: scroll;
            scrollbar-width:none;
            position: relative;
        }

        .box1 {
            position: absolute;
            top: 0;
            width: 90%;
            height: 90%;
            border: 2px solid green;
        }

        .box2 {
            position: absolute;
            top: 100%;
            width: 90%;
            height: 90%;
            border: 2px solid green;
        }
    </style>
</head>
